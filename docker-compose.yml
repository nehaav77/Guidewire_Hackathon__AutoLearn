version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: shieldride_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=shieldride

  redis:
    image: redis:7.0-alpine
    container_name: shieldride_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

volumes:
  mongodb_data:
  redis_data:
